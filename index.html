<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Menu &amp; Shopping Planner</title>
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Menu%20%26%20Shopping%20Planner%22,%22display%22:%22standalone%22}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF8F3;
  --surface:#FFFFFF;
  --surface-alt:#F1EDE4;
  --text-primary:#1F2A24;
  --text-secondary:#5B6B60;
  --text-disabled:#9CA79C;
  --border:#E4DDD0;
  --border-strong:#D3C9B6;
  --accent-green:#3F6B44;
  --accent-green-soft:#E7EFE6;
  --accent-rust:#B5502E;
  --accent-rust-soft:#F5E4DC;
  --accent-gold:#B98A2E;
  --accent-gold-soft:#F5EBD6;
  --accent-blue:#3F6E88;
  --accent-blue-soft:#E4EEF2;
  --shadow-card:0 1px 2px rgba(31,42,36,0.06), 0 4px 12px rgba(31,42,36,0.05);
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text-primary);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  padding-bottom:72px;
}
h1,h2,h3,.display{
  font-family:'Fraunces',serif;
  font-weight:600;
  letter-spacing:-0.01em;
  margin:0;
}
button{font-family:inherit;}
:focus-visible{outline:2px solid var(--accent-green);outline-offset:2px;}

/* ---------- Header ---------- */
header.top{
  position:sticky;top:0;z-index:20;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:16px 16px 0 16px;
}
.top-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.brand{display:flex;flex-direction:column;gap:2px;}
.brand .display{font-size:1.4rem;color:var(--text-primary);}
.brand .sub{font-size:0.78rem;color:var(--text-secondary);font-weight:500;}
.today-chip{
  font-family:'JetBrains Mono',monospace;
  font-size:0.72rem;font-weight:600;
  background:var(--accent-green-soft);color:var(--accent-green);
  padding:6px 10px;border-radius:999px;white-space:nowrap;
}
.tabs{display:flex;gap:4px;}
.tab-btn{
  flex:1;padding:11px 8px;border:none;background:transparent;
  color:var(--text-secondary);font-weight:600;font-size:0.92rem;
  border-bottom:2px solid transparent;cursor:pointer;
}
.tab-btn.active{color:var(--accent-green);border-bottom-color:var(--accent-green);}

main{max-width:640px;margin:0 auto;padding:16px;}
.view{display:none;}
.view.active{display:block;}

/* ---------- Week selector ---------- */
.week-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.week-btn{
  flex:1;min-width:70px;padding:9px 6px;border-radius:10px;
  border:1px solid var(--border-strong);background:var(--surface);
  color:var(--text-secondary);font-weight:600;font-size:0.82rem;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.week-btn .wk-num{font-family:'Fraunces',serif;font-size:1.05rem;color:var(--text-primary);}
.week-btn.current{border-color:var(--accent-green);background:var(--accent-green-soft);}
.week-btn.current .wk-num{color:var(--accent-green);}
.week-btn .wk-dot{width:6px;height:6px;border-radius:50%;background:transparent;}
.week-btn.current .wk-dot{background:var(--accent-green);}

.season-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.season-label{font-size:0.82rem;color:var(--text-secondary);font-weight:600;}
.season-toggle{display:flex;background:var(--surface-alt);border-radius:999px;padding:3px;gap:2px;}
.season-toggle button{
  border:none;background:transparent;padding:6px 12px;border-radius:999px;
  font-size:0.78rem;font-weight:600;color:var(--text-secondary);cursor:pointer;
}
.season-toggle button.active{background:var(--surface);color:var(--text-primary);box-shadow:var(--shadow-card);}

/* ---------- Day cards (recipe-card feel) ---------- */
.day-grid{display:flex;flex-direction:column;gap:10px;}
.day-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-top:3px solid var(--border-strong);
  border-radius:var(--radius);
  padding:14px 16px;
  box-shadow:var(--shadow-card);
  cursor:pointer;
  position:relative;
}
.day-card.today{border-top-color:var(--accent-green);}
.day-card .today-tag{
  position:absolute;top:-9px;right:14px;
  background:var(--accent-green);color:#fff;
  font-size:0.66rem;font-weight:700;letter-spacing:0.03em;
  padding:3px 9px;border-radius:999px;text-transform:uppercase;
}
.day-card-top{display:flex;align-items:center;gap:12px;}
.day-emoji{font-size:1.6rem;line-height:1;}
.day-meta{flex:1;min-width:0;}
.day-name{font-size:0.72rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;}
.day-meal{font-family:'Fraunces',serif;font-size:1.08rem;font-weight:600;color:var(--text-primary);margin-top:1px;}
.day-sides{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
.side-pill{
  font-size:0.74rem;font-weight:500;color:var(--text-secondary);
  background:var(--surface-alt);padding:4px 9px;border-radius:999px;
}
.season-suggest{
  margin-top:9px;padding-top:9px;border-top:1px dashed var(--border-strong);
  font-size:0.72rem;color:var(--accent-gold);font-weight:600;
}

/* ---------- Modal ---------- */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(31,42,36,0.42);
  z-index:50;align-items:flex-end;justify-content:center;
}
.overlay.active{display:flex;}
.modal{
  background:var(--surface);width:100%;max-width:640px;
  border-radius:20px 20px 0 0;padding:20px 18px 26px;
  max-height:88vh;overflow-y:auto;
}
.modal h3{font-size:1.15rem;margin-bottom:14px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:0.76rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.03em;margin-bottom:5px;}
.field input[type=text], .field textarea, .field select{
  width:100%;padding:10px 12px;border:1px solid var(--border-strong);
  border-radius:9px;font-size:0.94rem;font-family:inherit;background:var(--bg);color:var(--text-primary);
}
.field textarea{min-height:70px;resize:vertical;}
.modal-actions{display:flex;gap:8px;margin-top:6px;}
.btn{
  flex:1;padding:11px;border-radius:10px;border:none;font-weight:700;font-size:0.9rem;cursor:pointer;
}
.btn-primary{background:var(--accent-green);color:#fff;}
.btn-secondary{background:var(--surface-alt);color:var(--text-primary);}
.btn-danger{background:var(--accent-rust-soft);color:var(--accent-rust);}
.close-x{position:absolute;top:14px;right:16px;background:none;border:none;font-size:1.3rem;color:var(--text-secondary);cursor:pointer;}
.modal-wrap{position:relative;}

/* ---------- Shopping list ---------- */
.scope-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:14px;box-shadow:var(--shadow-card);
}
.scope-title{font-size:0.76rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:9px;}
.scope-options{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.chip-btn{
  padding:8px 13px;border-radius:999px;border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text-secondary);font-size:0.82rem;font-weight:600;cursor:pointer;
}
.chip-btn.active{background:var(--accent-green);border-color:var(--accent-green);color:#fff;}
.week-multi{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.week-multi.hidden{display:none;}
.week-check{
  padding:6px 12px;border-radius:8px;border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text-secondary);font-size:0.8rem;font-weight:600;cursor:pointer;
}
.week-check.on{background:var(--accent-green-soft);border-color:var(--accent-green);color:var(--accent-green);}
.staples-row{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-secondary);font-weight:500;}
.staples-row input{width:17px;height:17px;accent-color:var(--accent-green);}

.store-filter-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
.store-chip{
  white-space:nowrap;padding:7px 13px;border-radius:999px;border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text-secondary);font-size:0.8rem;font-weight:600;cursor:pointer;
}
.store-chip.active{background:var(--accent-blue);border-color:var(--accent-blue);color:#fff;}

.progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.progress-text{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--text-secondary);font-weight:600;}
.progress-bar{flex:1;height:6px;background:var(--surface-alt);border-radius:999px;margin:0 12px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent-green);border-radius:999px;transition:width .25s ease;}
.reset-link{background:none;border:none;color:var(--accent-rust);font-size:0.78rem;font-weight:600;cursor:pointer;white-space:nowrap;}

.receipt{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow-card);overflow:hidden;margin-bottom:16px;
}
.receipt-cat{padding:13px 16px 4px;}
.receipt-cat-title{
  font-family:'JetBrains Mono',monospace;font-size:0.74rem;font-weight:700;
  letter-spacing:0.06em;text-transform:uppercase;color:var(--text-secondary);
  display:flex;align-items:center;gap:7px;padding-bottom:8px;border-bottom:1px dashed var(--border-strong);margin-bottom:2px;
}
.cat-dot{width:8px;height:8px;border-radius:50%;}
.item-row{
  display:flex;align-items:center;gap:11px;padding:9px 0;
  border-bottom:1px dashed var(--border);
}
.item-row:last-child{border-bottom:none;}
.item-row.checked .item-name{color:var(--text-disabled);text-decoration:line-through;}
.item-row.checked .item-qty{color:var(--text-disabled);}
.item-check{
  width:20px;height:20px;border-radius:6px;border:2px solid var(--border-strong);
  background:var(--surface);flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:#fff;
}
.item-row.checked .item-check{background:var(--accent-green);border-color:var(--accent-green);}
.item-body{flex:1;min-width:0;cursor:pointer;}
.item-name{font-size:0.92rem;font-weight:500;color:var(--text-primary);}
.item-qty{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text-secondary);margin-top:1px;}
.item-note{font-size:0.72rem;color:var(--accent-gold);margin-top:1px;font-weight:600;}
.item-store{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--text-secondary);flex-shrink:0;white-space:nowrap;}

.add-item-row{padding:12px 16px;}
.add-item-btn{
  width:100%;padding:10px;border-radius:9px;border:1px dashed var(--border-strong);
  background:transparent;color:var(--accent-green);font-weight:600;font-size:0.86rem;cursor:pointer;
}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-secondary);}
.empty-state .display{font-size:1.1rem;margin-bottom:6px;color:var(--text-primary);}

.override-tag{
  position:absolute;top:-9px;left:14px;
  background:var(--accent-gold);color:#fff;
  font-size:0.62rem;font-weight:700;letter-spacing:0.03em;
  padding:3px 9px;border-radius:999px;text-transform:uppercase;
}

/* ---------- Inventory ---------- */
.inv-hint{font-size:0.84rem;color:var(--text-secondary);margin-bottom:14px;line-height:1.5;}
.inv-cat{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow-card);margin-bottom:14px;overflow:hidden;
}
.inv-cat-title{
  font-family:'JetBrains Mono',monospace;font-size:0.74rem;font-weight:700;
  letter-spacing:0.06em;text-transform:uppercase;color:var(--text-secondary);
  display:flex;align-items:center;gap:7px;padding:13px 16px 8px;
}
.inv-item-row{
  display:flex;align-items:center;gap:11px;padding:9px 16px;
  border-top:1px dashed var(--border);cursor:pointer;
}
.inv-item-row .item-check{flex-shrink:0;}
.inv-item-row.have .item-check{background:var(--accent-green);border-color:var(--accent-green);}
.inv-item-row .item-name{flex:1;font-size:0.92rem;}
.inv-add-row{padding:10px 16px 14px;}
.inv-add-form{display:flex;gap:8px;padding:0 16px 14px;}
.inv-add-form input{flex:1;padding:9px 11px;border:1px solid var(--border-strong);border-radius:8px;font-size:0.86rem;background:var(--bg);color:var(--text-primary);}
.inv-add-form select{padding:9px 8px;border:1px solid var(--border-strong);border-radius:8px;font-size:0.8rem;background:var(--bg);color:var(--text-primary);}
.inv-add-form button{padding:9px 14px;border-radius:8px;border:none;background:var(--accent-green);color:#fff;font-weight:700;font-size:0.86rem;cursor:pointer;}

/* ---------- Day modal: suggestions + swap ---------- */
.modal-section-title{
  font-size:0.76rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;
  letter-spacing:0.03em;margin:18px 0 9px;display:flex;align-items:center;justify-content:space-between;
}
.suggest-card{
  display:flex;align-items:center;gap:10px;padding:10px 11px;border:1px solid var(--border-strong);
  border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--bg);
}
.suggest-card:hover{border-color:var(--accent-green);}
.suggest-emoji{font-size:1.3rem;}
.suggest-body{flex:1;min-width:0;}
.suggest-name{font-size:0.9rem;font-weight:600;color:var(--text-primary);}
.suggest-status{font-size:0.72rem;font-weight:600;margin-top:2px;}
.suggest-status.ready{color:var(--accent-green);}
.suggest-status.missing{color:var(--accent-rust);}
.swap-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px;}
.swap-chip{
  padding:7px 12px;border-radius:8px;border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text-secondary);font-size:0.8rem;font-weight:600;cursor:pointer;
}
.swap-chip:hover{border-color:var(--accent-blue);}
.template-check-row{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--text-secondary);font-weight:500;margin:14px 0 4px;}
.template-check-row input{width:16px;height:16px;accent-color:var(--accent-green);}
.revert-link{background:none;border:none;color:var(--accent-rust);font-size:0.78rem;font-weight:600;cursor:pointer;padding:0;margin-bottom:10px;}

@media (min-width:600px){
  .day-grid{display:grid;grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="brand">
      <div class="display">Menu &amp; Shopping</div>
      <div class="sub" id="weekStatus">Week 1 · Monday</div>
    </div>
    <div class="today-chip" id="todayChip">—</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-view="calendar">Menu Calendar</button>
    <button class="tab-btn" data-view="shopping">Shopping List</button>
    <button class="tab-btn" data-view="inventory">Inventory</button>
  </div>
</header>

<main>

  <!-- ============ CALENDAR VIEW ============ -->
  <section class="view active" id="view-calendar">
    <div class="week-row" id="weekRow"></div>

    <div class="season-row">
      <span class="season-label">Season sides</span>
      <div class="season-toggle" id="seasonToggle">
        <button data-season="auto">Auto</button>
        <button data-season="summer">Summer</button>
        <button data-season="winter">Winter</button>
      </div>
    </div>

    <div class="day-grid" id="dayGrid"></div>
  </section>

  <!-- ============ SHOPPING VIEW ============ -->
  <section class="view" id="view-shopping">
    <div class="scope-card">
      <div class="scope-title">List scope</div>
      <div class="scope-options" id="scopeOptions">
        <button class="chip-btn" data-scope="week">This week</button>
        <button class="chip-btn" data-scope="month">Whole month (4 weeks)</button>
        <button class="chip-btn" data-scope="custom">Choose weeks</button>
      </div>
      <div class="week-multi hidden" id="weekMulti">
        <button class="week-check" data-w="1">Week 1</button>
        <button class="week-check" data-w="2">Week 2</button>
        <button class="week-check" data-w="3">Week 3</button>
        <button class="week-check" data-w="4">Week 4</button>
      </div>
      <label class="staples-row">
        <input type="checkbox" id="staplesToggle" checked>
        Include monthly staples basket
      </label>
      <label class="staples-row" style="margin-top:8px;">
        <input type="checkbox" id="hideOwnedToggle">
        Hide items I already have (per Inventory)
      </label>
    </div>

    <div class="store-filter-row" id="storeFilterRow"></div>

    <div class="progress-row">
      <span class="progress-text" id="progressText">0/0</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <button class="reset-link" id="resetListBtn">Uncheck all</button>
    </div>

    <div id="receiptContainer"></div>
  </section>

  <!-- ============ INVENTORY VIEW ============ -->
  <section class="view" id="view-inventory">
    <div class="inv-hint">Tick what's currently in the fridge or pantry. Tap a day in the calendar to see which meals you can already make with what's ticked here.</div>
    <div id="inventoryContainer"></div>
  </section>

</main>

<!-- ============ DAY EDIT MODAL ============ -->
<div class="overlay" id="dayModal">
  <div class="modal">
    <div class="modal-wrap">
      <button class="close-x" id="dayModalClose">×</button>
      <h3 id="dayModalTitle">Edit day</h3>

      <button class="revert-link" id="dmRevert" style="display:none;">↺ Revert to template default</button>

      <div class="modal-section-title">Suggested for this slot</div>
      <div id="dmSuggestions"></div>

      <div class="modal-section-title">Swap with another day this week</div>
      <div class="swap-row" id="dmSwapRow"></div>

      <div class="modal-section-title">Or edit manually</div>
      <div class="field">
        <label>Emoji</label>
        <input type="text" id="dmEmoji" maxlength="4">
      </div>
      <div class="field">
        <label>Meal name</label>
        <input type="text" id="dmMeal">
      </div>
      <div class="field">
        <label>Sides (one per line)</label>
        <textarea id="dmSides"></textarea>
      </div>

      <label class="template-check-row">
        <input type="checkbox" id="dmTemplateCheck">
        Also update the repeating template (applies every 4-week cycle, not just this week)
      </label>

      <div class="modal-actions">
        <button class="btn btn-secondary" id="dmCancel">Cancel</button>
        <button class="btn btn-primary" id="dmSave">Save for this week</button>
      </div>
    </div>
  </div>
</div>

<!-- ============ ITEM EDIT MODAL ============ -->
<div class="overlay" id="itemModal">
  <div class="modal">
    <div class="modal-wrap">
      <button class="close-x" id="itemModalClose">×</button>
      <h3 id="itemModalTitle">Edit item</h3>
      <div class="field">
        <label>Item name</label>
        <input type="text" id="imName">
      </div>
      <div class="field">
        <label>Quantity / note</label>
        <input type="text" id="imQty" placeholder="e.g. 1kg, x4, or leave blank">
      </div>
      <div class="field">
        <label>Category</label>
        <select id="imCategory"></select>
      </div>
      <div class="field">
        <label>Usual store</label>
        <select id="imStore"></select>
      </div>
      <div class="field">
        <label>Price / specials note</label>
        <input type="text" id="imPriceNote" placeholder="e.g. R89.99 on special at Checkers">
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="imDelete">Remove</button>
        <button class="btn btn-primary" id="imSave">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ================= DATA ================= */
const ANCHOR = new Date(2026,7,31); // 31 Aug 2026, Monday = Week1 Day0
const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const CATS = [
  {id:"veg",   label:"Fresh Veg",     color:"var(--accent-green)"},
  {id:"dairy", label:"Dairy",         color:"var(--accent-blue)"},
  {id:"pantry",label:"Pantry",        color:"var(--accent-gold)"},
  {id:"meat",  label:"Meat & Fish",   color:"var(--accent-rust)"},
  {id:"fruit", label:"Fruit & Snacks",color:"var(--accent-green)"},
  {id:"other", label:"Other",         color:"var(--text-secondary)"}
];
const STORES = ["Any store","Spar","Checkers","Pick n Pay","Food Lovers Market","Golden Harvest","BraaiBox","Other"];

// i(name, category, qty) helper for ingredient shorthand
function i(name,cat,qty){ return {name,cat,qty:qty||""}; }

const DEFAULT_WEEKS = {

/* ================= DATE / CYCLE LOGIC ================= */
function currentWeekDay(d){
  d = d || new Date();
  const start = new Date(ANCHOR.getFullYear(), ANCHOR.getMonth(), ANCHOR.getDate());
  const today = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  let diff = Math.floor((today - start) / 86400000);
  diff = ((diff % 28) + 28) % 28;
  const week = Math.floor(diff/7)+1;
  const dow = diff % 7;
  return {week, dow, dayName: DOW[dow]};
}
function isBeforeStart(){
  const start = new Date(ANCHOR.getFullYear(), ANCHOR.getMonth(), ANCHOR.getDate());
  const today = new Date();
  return new Date(today.getFullYear(),today.getMonth(),today.getDate()) < start;
}
function getSeason(){
  if(seasonPref !== "auto") return seasonPref;
  const m = new Date().getMonth()+1; // 1-12
  return (m>=10 || m<=3) ? "summer" : "winter";
}
// Which real 28-day cycle is "current" — used so this-week swaps only affect this occurrence
function cycleStartForNow(){
  const start = new Date(ANCHOR.getFullYear(), ANCHOR.getMonth(), ANCHOR.getDate());
  const today = new Date();
  const todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  let diff = Math.floor((todayMid - start) / 86400000);
  if(diff < 0) return start; // before season start, treat first cycle as "current"
  const cycleIndex = Math.floor(diff/28);
  const cs = new Date(start);
  cs.setDate(cs.getDate() + cycleIndex*28);
  return cs;
}
function dateForSlot(week, idx){
  const cs = cycleStartForNow();
  const d = new Date(cs);
  d.setDate(d.getDate() + (week-1)*7 + idx);
  return d;
}
function dateKey(d){
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), da = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${da}`;
}
function occKey(week, idx){ return dateKey(dateForSlot(week, idx)); }
// Effective content for a day = this-occurrence override if present, else the repeating template
function effectiveDay(week, idx){
  const ov = occurrenceOverrides[occKey(week, idx)];
  return ov || menuData[week][idx];
}
function hasOverride(week, idx){ return !!occurrenceOverrides[occKey(week, idx)]; }

/* ================= RENDER: HEADER ================= */
function renderHeader(){
  const cwd = currentWeekDay();
  const before = isBeforeStart();
  document.getElementById("todayChip").textContent = before ? "Starts 1 Sep 2026" : `Week ${cwd.week} · ${cwd.dayName}`;
  document.getElementById("weekStatus").textContent = before
    ? "Fridge-first mode — planner starts 31 Aug 2026"
    : `Week ${cwd.week} · ${cwd.dayName}`;
}

/* ================= RENDER: CALENDAR ================= */
function renderWeekRow(){
  const row = document.getElementById("weekRow");
  row.innerHTML = "";
  const cwd = currentWeekDay();
  for(let w=1; w<=4; w++){
    const btn = document.createElement("button");
    btn.className = "week-btn" + (w===selectedCalWeek?" current":"");
    btn.innerHTML = `<span class="wk-num">W${w}</span><span style="font-size:.68rem">${w===cwd.week && !isBeforeStart() ? "this week" : ""}</span><span class="wk-dot"></span>`;
    btn.onclick = () => { selectedCalWeek = w; renderWeekRow(); renderDayGrid(); };
    row.appendChild(btn);
  }
}
function renderSeasonToggle(){
  document.querySelectorAll("#seasonToggle button").forEach(b=>{
    b.classList.toggle("active", b.dataset.season === seasonPref);
    b.onclick = () => { seasonPref = b.dataset.season; save(LS.season, seasonPref); renderSeasonToggle(); renderDayGrid(); };
  });
}
function renderDayGrid(){
  const grid = document.getElementById("dayGrid");
  grid.innerHTML = "";
  const cwd = currentWeekDay();
  const season = getSeason();
  const days = menuData[selectedCalWeek];
  days.forEach((templateDay, idx) => {
    const day = effectiveDay(selectedCalWeek, idx);
    const overridden = hasOverride(selectedCalWeek, idx);
    const isToday = !isBeforeStart() && cwd.week===selectedCalWeek && cwd.dow===idx;
    const card = document.createElement("div");
    card.className = "day-card" + (isToday ? " today":"");
    let suggestHtml = "";
    if(DOW[idx]==="Sun" && !overridden){
      suggestHtml = `<div class="season-suggest">${season==="summer"?"☀️":"❄️"} ${SEASON_SUGGEST[season].sundayLabel}</div>`;
    }
    card.innerHTML = `
      ${isToday?'<span class="today-tag">Today</span>':''}
      ${overridden?'<span class="override-tag">Swapped this week</span>':''}
      <div class="day-card-top">
        <div class="day-emoji">${day.emoji||"🍽️"}</div>
        <div class="day-meta">
          <div class="day-name">${DOW[idx]}</div>
          <div class="day-meal">${day.meal}</div>
        </div>
      </div>
      ${(day.sides&&day.sides.length) ? `<div class="day-sides">${day.sides.map(s=>`<span class="side-pill">${s}</span>`).join("")}</div>` : ""}
      ${suggestHtml}
    `;
    card.onclick = () => openDayModal(selectedCalWeek, idx);
    grid.appendChild(card);
  });
}

/* ================= DAY MODAL ================= */
function fillDayFields(content){
  document.getElementById("dmEmoji").value = content.emoji || "";
  document.getElementById("dmMeal").value = content.meal || "";
  document.getElementById("dmSides").value = (content.sides||[]).join("\n");
  editingDay.pendingIng = content.ing || editingDay.pendingIng || [];
}
function openDayModal(week, idx){
  editingDay = {week, idx, pendingIng:null};
  const content = effectiveDay(week, idx);
  document.getElementById("dayModalTitle").textContent = `${DOW[idx]} · Week ${week}`;
  fillDayFields(content);
  editingDay.pendingIng = content.ing;
  document.getElementById("dmTemplateCheck").checked = false;
  document.getElementById("dmRevert").style.display = hasOverride(week, idx) ? "block" : "none";

  // Suggestions
  const suggWrap = document.getElementById("dmSuggestions");
  suggWrap.innerHTML = "";
  const label = document.createElement("div");
  label.style.cssText = "font-size:.76rem;color:var(--text-secondary);margin-bottom:8px;";
  label.textContent = SLOT_LABELS[idx];
  suggWrap.appendChild(label);
  slotLibrary(idx).forEach(opt => {
    const cov = coverageFor(opt.ing);
    const ready = cov.total>0 && cov.have===cov.total;
    const card = document.createElement("div");
    card.className = "suggest-card";
    card.innerHTML = `
      <div class="suggest-emoji">${opt.emoji||"🍽️"}</div>
      <div class="suggest-body">
        <div class="suggest-name">${opt.meal}</div>
        <div class="suggest-status ${ready?'ready':'missing'}">${ready ? "Ready to cook" : (cov.total ? `Missing: ${cov.missing.slice(0,3).join(", ")}${cov.missing.length>3?"…":""}` : "")}</div>
      </div>
    `;
    card.onclick = () => fillDayFields(opt);
    suggWrap.appendChild(card);
  });

  // Swap-with-day row (same visible week)
  const swapWrap = document.getElementById("dmSwapRow");
  swapWrap.innerHTML = "";
  DOW.forEach((d, otherIdx) => {
    if(otherIdx === idx) return;
    const chip = document.createElement("button");
    chip.className = "swap-chip";
    const otherContent = effectiveDay(week, otherIdx);
    chip.textContent = `↔ ${d}: ${otherContent.meal}`;
    chip.onclick = () => {
      const thisContent = effectiveDay(week, idx);
      occurrenceOverrides[occKey(week, otherIdx)] = {emoji:thisContent.emoji, meal:thisContent.meal, sides:thisContent.sides||[], ing:thisContent.ing||[]};
      occurrenceOverrides[occKey(week, idx)] = {emoji:otherContent.emoji, meal:otherContent.meal, sides:otherContent.sides||[], ing:otherContent.ing||[]};
      save(LS.overrides, occurrenceOverrides);
      closeDayModal();
      renderDayGrid();
    };
    swapWrap.appendChild(chip);
  });

  document.getElementById("dayModal").classList.add("active");
}
function closeDayModal(){ document.getElementById("dayModal").classList.remove("active"); editingDay=null; }
document.getElementById("dayModalClose").onclick = closeDayModal;
document.getElementById("dmCancel").onclick = closeDayModal;
document.getElementById("dmRevert").onclick = () => {
  if(!editingDay) return;
  delete occurrenceOverrides[occKey(editingDay.week, editingDay.idx)];
  save(LS.overrides, occurrenceOverrides);
  closeDayModal();
  renderDayGrid();
};
document.getElementById("dmSave").onclick = () => {
  if(!editingDay) return;
  const {week, idx} = editingDay;
  const emoji = document.getElementById("dmEmoji").value.trim();
  const meal = document.getElementById("dmMeal").value.trim() || menuData[week][idx].meal;
  const sides = document.getElementById("dmSides").value.split("\n").map(s=>s.trim()).filter(Boolean);
  const ing = editingDay.pendingIng && editingDay.pendingIng.length ? editingDay.pendingIng : menuData[week][idx].ing;
  const content = {emoji, meal, sides, ing};

  const updateTemplate = document.getElementById("dmTemplateCheck").checked;
  if(updateTemplate){
    menuData[week][idx] = content;
    save(LS.menu, menuData);
    delete occurrenceOverrides[occKey(week, idx)];
  } else {
    occurrenceOverrides[occKey(week, idx)] = content;
  }
  save(LS.overrides, occurrenceOverrides);
  closeDayModal();
  renderDayGrid();
};

/* ================= SHOPPING LIST LOGIC ================= */
function activeWeeksForScope(){
  const cwd = currentWeekDay();
  if(scopeMode === "week") return [isBeforeStart() ? 1 : cwd.week];
  if(scopeMode === "month") return [1,2,3,4];
  return weekSel.length ? weekSel.slice().sort() : [1];
}
function listKey(){
  return scopeMode + ":" + activeWeeksForScope().join(",") + (staplesOn?":s1":":s0");
}
function buildRawItems(){
  const weeks = activeWeeksForScope();
  const map = {}; // name -> {name,cat,qty,sources:Set}
  function add(item){
    const key = item.name.toLowerCase();
    if(!map[key]) map[key] = {name:item.name, cat:item.cat, qty:item.qty||""};
  }
  weeks.forEach(w=>{
    menuData[w].forEach((templateDay, idx) => (effectiveDay(w, idx).ing||[]).forEach(add));
  });
  if(staplesOn){
    STAPLES_BASE.forEach(add);
    if(getSeason()==="winter") WINTER_EXTRAS.forEach(add);
  }
  // merge custom items for this list
  const key = listKey();
  (customItems[key]||[]).forEach(add);
  return Object.values(map);
}
function itemStore(name){
  return (itemMeta[name] && itemMeta[name].store) || "Any store";
}
function itemPriceNote(name){
  return (itemMeta[name] && itemMeta[name].priceNote) || "";
}
function isChecked(name){
  const key = listKey();
  return !!(checkedState[key] && checkedState[key][name]);
}
function toggleChecked(name){
  const key = listKey();
  if(!checkedState[key]) checkedState[key] = {};
  checkedState[key][name] = !checkedState[key][name];
  save(LS.checked, checkedState);
  if(checkedState[key][name]){
    // buying it means you now have it — keep Inventory in sync
    inventoryState[name.toLowerCase()] = true;
    save(LS.inventory, inventoryState);
  }
}

/* ================= INVENTORY LOGIC ================= */
function buildMasterItems(){
  const map = {};
  Object.values(menuData).forEach(days => days.forEach(day => (day.ing||[]).forEach(it => {
    const k = it.name.toLowerCase();
    if(!map[k]) map[k] = {name:it.name, cat:it.cat};
  })));
  STAPLES_BASE.forEach(it => { const k=it.name.toLowerCase(); if(!map[k]) map[k]={name:it.name,cat:it.cat}; });
  WINTER_EXTRAS.forEach(it => { const k=it.name.toLowerCase(); if(!map[k]) map[k]={name:it.name,cat:it.cat}; });
  customInventoryItems.forEach(it => { const k=it.name.toLowerCase(); if(!map[k]) map[k]={name:it.name,cat:it.cat}; });
  return Object.values(map);
}
function invHas(name){ return !!inventoryState[name.toLowerCase()]; }
function toggleInv(name){
  const k = name.toLowerCase();
  inventoryState[k] = !inventoryState[k];
  save(LS.inventory, inventoryState);
}
function renderInventory(){
  const container = document.getElementById("inventoryContainer");
  container.innerHTML = "";
  const items = buildMasterItems();
  const byCat = {}; CATS.forEach(c => byCat[c.id]=[]);
  items.forEach(it => (byCat[it.cat]||byCat.other).push(it));
  CATS.forEach(cat => {
    const list = byCat[cat.id];
    if(!list.length) return;
    const block = document.createElement("div");
    block.className = "inv-cat";
    const title = document.createElement("div");
    title.className = "inv-cat-title";
    title.innerHTML = `<span class="cat-dot" style="background:${cat.color}"></span>${cat.label}`;
    block.appendChild(title);
    list.sort((a,b)=>a.name.localeCompare(b.name)).forEach(it => {
      const row = document.createElement("div");
      row.className = "inv-item-row" + (invHas(it.name) ? " have":"");
      row.innerHTML = `<div class="item-check">${invHas(it.name)?"✓":""}</div><div class="item-name">${it.name}</div>`;
      row.onclick = () => { toggleInv(it.name); renderInventory(); };
      block.appendChild(row);
    });
    container.appendChild(block);
  });
  const addBlock = document.createElement("div");
  addBlock.className = "inv-cat";
  addBlock.innerHTML = `
    <div class="inv-cat-title"><span class="cat-dot" style="background:var(--text-secondary)"></span>Add something else</div>
    <div class="inv-add-form">
      <input type="text" id="invNewName" placeholder="e.g. leftover lasagna">
      <select id="invNewCat">${CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join("")}</select>
      <button id="invAddBtn">Add</button>
    </div>
  `;
  container.appendChild(addBlock);
  document.getElementById("invAddBtn").onclick = () => {
    const name = document.getElementById("invNewName").value.trim();
    if(!name) return;
    const cat = document.getElementById("invNewCat").value;
    customInventoryItems = customInventoryItems.filter(x=>x.name.toLowerCase()!==name.toLowerCase());
    customInventoryItems.push({name, cat});
    save(LS.invcustom, customInventoryItems);
    inventoryState[name.toLowerCase()] = true;
    save(LS.inventory, inventoryState);
    renderInventory();
  };
}

/* ---------- meal suggestions for a given day slot ---------- */
function slotLibrary(idx){
  return [1,2,3,4].map(w => ({week:w, ...menuData[w][idx]}));
}
function coverageFor(ing){
  let have=0; const missing=[];
  (ing||[]).forEach(it => { if(invHas(it.name)) have++; else missing.push(it.name); });
  return {have, total:(ing||[]).length, missing};
}

/* ---------- render scope UI ---------- */
function renderScopeUI(){
  document.querySelectorAll("#scopeOptions .chip-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.scope === scopeMode);
  });
  document.getElementById("weekMulti").classList.toggle("hidden", scopeMode !== "custom");
  document.querySelectorAll(".week-check").forEach(b=>{
    const w = parseInt(b.dataset.w,10);
    b.classList.toggle("on", weekSel.includes(w));
  });
  document.getElementById("staplesToggle").checked = staplesOn;
  document.getElementById("hideOwnedToggle").checked = hideOwned;
}
document.querySelectorAll("#scopeOptions .chip-btn").forEach(b=>{
  b.onclick = () => { scopeMode = b.dataset.scope; save(LS.scope, scopeMode); renderScopeUI(); renderShoppingList(); };
});
document.querySelectorAll(".week-check").forEach(b=>{
  b.onclick = () => {
    const w = parseInt(b.dataset.w,10);
    if(weekSel.includes(w)) weekSel = weekSel.filter(x=>x!==w);
    else weekSel = weekSel.concat([w]);
    save(LS.weeksel, weekSel);
    renderScopeUI(); renderShoppingList();
  };
});
document.getElementById("staplesToggle").onchange = (e) => {
  staplesOn = e.target.checked; save(LS.staples, staplesOn); renderShoppingList();
};
document.getElementById("hideOwnedToggle").onchange = (e) => {
  hideOwned = e.target.checked; save(LS.hideowned, hideOwned); renderShoppingList();
};
document.getElementById("resetListBtn").onclick = () => {
  const key = listKey();
  checkedState[key] = {};
  save(LS.checked, checkedState);
  renderShoppingList();
};

/* ---------- store filter chips ---------- */
function renderStoreFilterRow(){
  const row = document.getElementById("storeFilterRow");
  row.innerHTML = "";
  STORES.forEach(s=>{
    const chip = document.createElement("button");
    chip.className = "store-chip" + (storeFilter===s?" active":"");
    chip.textContent = s;
    chip.onclick = () => { storeFilter = s; save(LS.storefilter, s); renderShoppingList(); };
    row.appendChild(chip);
  });
}

/* ---------- main shopping list render ---------- */
function renderShoppingList(){
  renderScopeUI();
  const container = document.getElementById("receiptContainer");
  container.innerHTML = "";
  let items = buildRawItems();
  if(storeFilter !== "Any store"){
    items = items.filter(it => itemStore(it.name) === storeFilter || itemStore(it.name)==="Any store");
  }
  if(hideOwned){
    items = items.filter(it => !invHas(it.name));
  }
  // group by category
  const byCat = {};
  CATS.forEach(c => byCat[c.id] = []);
  items.forEach(it => { (byCat[it.cat] || byCat.other).push(it); });

  let total = 0, done = 0;
  items.forEach(it => { total++; if(isChecked(it.name)) done++; });
  document.getElementById("progressText").textContent = `${done}/${total}`;
  document.getElementById("progressFill").style.width = total ? `${Math.round(done/total*100)}%` : "0%";

  if(total === 0){
    container.innerHTML = `<div class="empty-state"><div class="display">No items yet</div>Pick a scope above, or add an item manually.</div>`;
  }

  CATS.forEach(cat => {
    const list = byCat[cat.id];
    if(!list.length) return;
    const block = document.createElement("div");
    block.className = "receipt";
    const catDiv = document.createElement("div");
    catDiv.className = "receipt-cat";
    catDiv.innerHTML = `<div class="receipt-cat-title"><span class="cat-dot" style="background:${cat.color}"></span>${cat.label}</div>`;
    list.sort((a,b)=>a.name.localeCompare(b.name)).forEach(it => {
      const row = document.createElement("div");
      row.className = "item-row" + (isChecked(it.name) ? " checked":"");
      const store = itemStore(it.name);
      const note = itemPriceNote(it.name);
      const owned = invHas(it.name);
      row.innerHTML = `
        <div class="item-check">${isChecked(it.name) ? "✓":""}</div>
        <div class="item-body">
          <div class="item-name">${it.name}</div>
          ${it.qty ? `<div class="item-qty">${it.qty}</div>` : ""}
          ${owned ? `<div class="item-note" style="color:var(--accent-green)">🏠 Already have — check inventory before buying</div>` : ""}
          ${note ? `<div class="item-note">${note}</div>` : ""}
        </div>
        <div class="item-store">${store !== "Any store" ? store : ""}</div>
      `;
      row.querySelector(".item-check").onclick = (e) => { e.stopPropagation(); toggleChecked(it.name); renderShoppingList(); renderInventory(); };
      row.querySelector(".item-body").onclick = () => openItemModal(it.name, it.cat, it.qty);
      catDiv.appendChild(row);
    });
    block.appendChild(catDiv);
    container.appendChild(block);
  });

  const addRow = document.createElement("div");
  addRow.className = "receipt";
  addRow.innerHTML = `<div class="add-item-row"><button class="add-item-btn" id="addItemBtn">+ Add item</button></div>`;
  container.appendChild(addRow);
  document.getElementById("addItemBtn").onclick = () => openItemModal(null, "other", "");
}

/* ================= ITEM MODAL ================= */
function populateSelect(sel, options, current){
  sel.innerHTML = "";
  options.forEach(o=>{
    const val = typeof o === "string" ? o : o.id;
    const label = typeof o === "string" ? o : o.label;
    const opt = document.createElement("option");
    opt.value = val; opt.textContent = label;
    if(val === current) opt.selected = true;
    sel.appendChild(opt);
  });
}
function openItemModal(name, cat, qty){
  editingItem = name; // null = new item
  document.getElementById("itemModalTitle").textContent = name ? "Edit item" : "Add item";
  document.getElementById("imName").value = name || "";
  document.getElementById("imQty").value = qty || "";
  populateSelect(document.getElementById("imCategory"), CATS, cat || "other");
  populateSelect(document.getElementById("imStore"), STORES, name ? itemStore(name) : "Any store");
  document.getElementById("imPriceNote").value = name ? itemPriceNote(name) : "";
  document.getElementById("imDelete").style.display = name ? "block" : "none";
  document.getElementById("itemModal").classList.add("active");
}
function closeItemModal(){ document.getElementById("itemModal").classList.remove("active"); editingItem=null; }
document.getElementById("itemModalClose").onclick = closeItemModal;
document.getElementById("imSave").onclick = () => {
  const newName = document.getElementById("imName").value.trim();
  if(!newName){ closeItemModal(); return; }
  const cat = document.getElementById("imCategory").value;
  const qty = document.getElementById("imQty").value.trim();
  const store = document.getElementById("imStore").value;
  const priceNote = document.getElementById("imPriceNote").value.trim();

  itemMeta[newName] = {store, priceNote};
  save(LS.items, itemMeta);

  const key = listKey();
  if(!customItems[key]) customItems[key] = [];
  // if this is a brand-new manual item (not from menu/staples), store it so it persists
  const existsInBase = buildBaseNamesForKey(key).includes(newName.toLowerCase());
  if(!existsInBase){
    customItems[key] = customItems[key].filter(x=>x.name.toLowerCase() !== newName.toLowerCase());
    customItems[key].push({name:newName, cat, qty});
    save(LS.custom, customItems);
  }
  closeItemModal();
  renderShoppingList();
};
document.getElementById("imDelete").onclick = () => {
  if(!editingItem){ closeItemModal(); return; }
  const key = listKey();
  if(customItems[key]) customItems[key] = customItems[key].filter(x=>x.name.toLowerCase() !== editingItem.toLowerCase());
  save(LS.custom, customItems);
  delete itemMeta[editingItem];
  save(LS.items, itemMeta);
  closeItemModal();
  renderShoppingList();
};
function buildBaseNamesForKey(key){
  // names coming from menu+staples only (without custom), used to know if an item is "custom"
  const weeks = activeWeeksForScope();
  const names = [];
  weeks.forEach(w=> menuData[w].forEach((templateDay, idx)=> (effectiveDay(w, idx).ing||[]).forEach(it=>names.push(it.name.toLowerCase()))));
  if(staplesOn){
    STAPLES_BASE.forEach(it=>names.push(it.name.toLowerCase()));
    if(getSeason()==="winter") WINTER_EXTRAS.forEach(it=>names.push(it.name.toLowerCase()));
  }
  return names;
}

/* ================= TABS ================= */
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.onclick = () => {
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("view-"+btn.dataset.view).classList.add("active");
  };
});

/* ================= INIT ================= */
function init(){
  renderHeader();
  renderWeekRow();
  renderSeasonToggle();
  renderDayGrid();
  renderScopeUI();
  renderStoreFilterRow();
  renderShoppingList();
  renderInventory();
}
init();
</script>
